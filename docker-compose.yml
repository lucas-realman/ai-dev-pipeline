# ============================================================
# AutoDev Pipeline — Docker Compose 部署配置
# 对齐: OPS-001 §2
# ============================================================

version: "3.9"

services:
  # ── 主服务: Dashboard API ──────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autodev-orchestrator
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/app/configs:ro
      - ./reports:/app/reports
      - ./logs:/app/logs
    environment:
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
      - OPENAI_API_BASE=${OPENAI_API_BASE:-http://host.docker.internal:8000/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AIDER_MODEL=${AIDER_MODEL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8080/api/status'); assert r.status_code == 200"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── 测试环境 ───────────────────────────────────
  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autodev-test
    entrypoint: ["python", "-m", "pytest"]
    command: ["-m", "smoke or component or integration", "--cov=orchestrator", "--cov-fail-under=85", "-q"]
    volumes:
      - ./tests:/app/tests:ro
      - ./orchestrator:/app/orchestrator:ro
    environment:
      - OPENAI_API_BASE=http://localhost:8000/v1
      - OPENAI_API_KEY=test-key
      - AIDER_MODEL=test-model
    profiles:
      - test
