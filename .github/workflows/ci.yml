# ============================================================
# AutoDev Pipeline — CI 流水线
# 对齐 plan-v2 §4: 短路机制 Lint → L1 → L2 → L3 → L4
# ============================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  # 测试用环境变量 (CI 中不调用真实 LLM)
  OPENAI_API_BASE: "http://localhost:8000/v1"
  OPENAI_API_KEY: "ci-test-key"
  AIDER_MODEL: "ci-test-model"

jobs:
  # ── Stage 1: Lint ──────────────────────────────
  lint:
    name: "Lint (ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check orchestrator/ tests/

  # ── Stage 2: L1 冒烟测试 ───────────────────────
  test-l1:
    name: "L1 Smoke Tests"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run L1 smoke tests
        run: pytest -m smoke --tb=short -q

  # ── Stage 3: L2 组件测试 ───────────────────────
  test-l2:
    name: "L2 Component Tests"
    needs: test-l1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run L2 component tests
        run: |
          pytest -m component \
            --tb=long \
            --cov=orchestrator \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --cov-fail-under=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-l2
          path: htmlcov/
          retention-days: 7

  # ── Stage 4: L3 集成测试 ───────────────────────
  test-l3:
    name: "L3 Integration Tests"
    needs: test-l2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run L3 integration tests
        run: |
          pytest -m "smoke or component or integration" \
            --tb=long \
            --cov=orchestrator \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report
          path: .report.json
          retention-days: 7

  # ── Stage 5: L4 验收测试 (里程碑节点触发) ──────
  test-l4:
    name: "L4 Acceptance Tests"
    needs: test-l3
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run L4 acceptance tests
        run: |
          pytest -m acceptance \
            --tb=long \
            -v

  # ── 全量覆盖率 (Badge 数据) ────────────────────
  coverage-report:
    name: "Coverage Report"
    needs: test-l3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Generate full coverage
        run: |
          pytest -m "smoke or component or integration" \
            --cov=orchestrator \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --cov-report=json:coverage.json \
            --cov-fail-under=85 \
            -q

      - name: Upload full coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-full
          path: |
            htmlcov/
            coverage.json
          retention-days: 14
